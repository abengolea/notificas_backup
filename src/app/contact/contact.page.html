<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col>
        <h1>
          {{!!contactUser && !!contactUser.id ? 'Actualizar Contacto' : 'Nuevo
          Contacto'}}
        </h1>
      </ion-col>
    </ion-row>
    <form [formGroup]="contactForm" (ngSubmit)="saveContact()">
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Email*</ion-label>
            <ion-input
              formControlName="email"
              type="email"
              (ionBlur)="search()"
              placeholder="ingrese el email"
              [disabled]="wait"
            ></ion-input>
          </ion-item>
          <div *ngFor="let error of errorMessages.email">
            <ng-container
              *ngIf="email.hasError(error.type) && (email.dirty || email.touched)"
            >
              <small class="error-message">{{error.message}}</small>
            </ng-container>
          </div>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Apellido*</ion-label>
            <ion-input
              formControlName="lastname"
              placeholder="ingrese el apellido"
            ></ion-input>
          </ion-item>
          <div *ngFor="let error of errorMessages.lastname">
            <ng-container
              *ngIf="lastname.hasError(error.type) && (lastname.dirty || lastname.touched)"
            >
              <small class="error-message">{{error.message}}</small>
            </ng-container>
          </div>
        </ion-col>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Nombre*</ion-label>
            <ion-input
              formControlName="firstname"
              placeholder="Ingrese el nombre"
            ></ion-input>
          </ion-item>
          <div *ngFor="let error of errorMessages.firstname">
            <ng-container
              *ngIf="firstname.hasError(error.type) && (firstname.dirty || firstname.touched)"
            >
              <small class="error-message">{{error.message}}</small>
            </ng-container>
          </div>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">DNI</ion-label>
            <ion-input formControlName="dni" placeholder=""></ion-input>
          </ion-item>
        </ion-col>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">CUIT</ion-label>
            <ion-input formControlName="cuit" placeholder=""></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Teléfono</ion-label>
            <ion-input formControlName="phoneNumber" placeholder=""></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row *ngIf="contactUser && contactUser.id">
        <ion-col>
          <ion-item>
            <ion-label>¿Es apoderado de esta persona?</ion-label>
            <ion-checkbox
              formControlName="isEmpowered"
              placeholder=""
            ></ion-checkbox>
          </ion-item>
        </ion-col>
      </ion-row>
    </form>

    <ion-row *ngIf="isEmpowered.value && contactUser.id">
      <ion-col>
        <ion-row>
          <ion-label class="title-label">Documentación adjunta:</ion-label>
        </ion-row>
        <ion-row>
          <ion-col size="12">
            <input type="file" (change)="selectAndUploadFiles($event)" />
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col size="12">
            <ion-item *ngFor="let multi of multimediaList; index as i">
              <ion-input type="text" [(ngModel)]="multi.fileName"></ion-input>
              <ion-button
                class="footer-button"
                color="light"
                (click)="download(multi.key)"
                [disabled]="wait"
              >
                Descargar
              </ion-button>
              <ion-button
                class="footer-button"
                color="danger"
                (click)="removeMultimedia(multi)"
                [disabled]="wait"
              >
                Eliminar
              </ion-button>
            </ion-item>
          </ion-col>
        </ion-row>
      </ion-col>
    </ion-row>

    <ion-row class="footer-row">
      <ion-col>
        <div class="footer-button-container">
          <ion-button
            class="footer-button"
            color="light"
            (click)="cancelForm()"
            [disabled]="wait"
          >
            Cancelar</ion-button
          >
          <ion-button
            class="footer-button"
            color="danger"
            (click)="saveContact()"
            [disabled]="!canSubmit() || wait"
            >Aceptar</ion-button
          >
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
