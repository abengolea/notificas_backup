<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col>
        <h1 class="ion-margin-start color-secondary">Nuevo Usuario</h1>
      </ion-col>
    </ion-row>

    <form [formGroup]="userForm" (ngSubmit)="save()">
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Tipo de Usuario</ion-label>
            <ion-select
              formControlName="userType"
              placeholder="Seleccionar"
              [(ngModel)]="userTypeSelected"
              [compareWith]="compararPorId"
            >
              <ion-select-option *ngFor="let ut of userTypes" [value]="ut"
                >{{ut.name}}</ion-select-option
              >
            </ion-select>
          </ion-item>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label class="title-label" *ngIf="userTypeSelected.id !== 4" position="stacked">Apellido*</ion-label>
            <ion-label class="title-label" *ngIf="userTypeSelected.id === 4" position="stacked">Razón social*</ion-label>
            <ion-input formControlName="lastName"></ion-input>
          </ion-item>
          <div *ngFor="let error of errorMessages.lastName">
            <ng-container
              *ngIf="lastName.hasError(error.type) && (lastName.dirty || lastName.touched)"
            >
              <small class="error-message">{{error.message}}</small>
            </ng-container>
          </div>
        </ion-col>
        <ion-col>
          <ion-item>
            <ion-label class="title-label" *ngIf="userTypeSelected.id !== 4" position="stacked">Nombre*</ion-label>
            <ion-label class="title-label" *ngIf="userTypeSelected.id === 4" position="stacked">Nombre fantasía*</ion-label>
            <ion-input formControlName="firstName"></ion-input>
          </ion-item>
          <div *ngFor="let error of errorMessages.firstName">
            <ng-container
              *ngIf="firstName.hasError(error.type) && (firstName.dirty || firstName.touched)"
            >
              <small class="error-message">{{error.message}}</small>
            </ng-container>
          </div>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col *ngIf="userTypeSelected && userTypeSelected.id!=4">
          <ion-item>
            <ion-label position="stacked">DNI</ion-label>
            <ion-input formControlName="dni" placeholder=""></ion-input>
          </ion-item>
        </ion-col>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">CUIT</ion-label>
            <ion-input formControlName="cuit" placeholder=""></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Teléfono</ion-label>
            <ion-input formControlName="phoneNumber" placeholder=""></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">E-mail*</ion-label>
            <ion-input formControlName="email" placeholder=""></ion-input>
          </ion-item>
          <div *ngFor="let error of errorMessages.email">
            <ng-container *ngIf="email.hasError(error.type) && (email.dirty || email.touched)">
              <small class="error-message">{{error.message}}</small>
            </ng-container>
          </div>
        </ion-col>
      </ion-row>
      <ion-card>
        <ion-row class="footer-row">
          <ion-col class="ion-text-end">
            <div class="footer-button-container">
              <ion-button
                  class="footer-button"
                  expand="full"
                  color="light"
                  [disabled]="wait"
                  (click)="goHome()"
                >Cancelar</ion-button>
                <ion-button
                  class="footer-button"
                  expand="full"
                  color="primary"
                  [disabled]="wait || !userForm.valid"
                  type="submit"
                >Guardar</ion-button
              >
            </div>
          </ion-col>
        </ion-row>
      </ion-card>
    </form>
  </ion-grid>
</ion-content>
