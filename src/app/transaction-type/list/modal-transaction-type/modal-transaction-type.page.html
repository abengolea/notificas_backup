<ion-header>
  <ion-toolbar>
    <ion-row>
      <ion-col size="auto">
        <h1 class="ion-margin-start color-secondary">Agregar Oferta</h1>
      </ion-col>
      <!--       <ion-col *ngIf="wait">
        <img
          src="/assets/images/loading.gif"
          style="height: 60px; margin-top: 5px"
        />
      </ion-col> -->
    </ion-row>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid style="padding: 0 20px 0 20px">
    <form [formGroup]="nuevaOfertaForm">
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label
              position="stacked"
              *ngIf="nuevaOfertaForm.get('name').errors?.required"
              class="is-invalid"
            >
              Nombre
            </ion-label>
            <ion-label
              position="stacked"
              *ngIf="nuevaOfertaForm.get('name').errors?.minlength"
              class="is-invalid"
            >
              Nombre
              ({{nuevaOfertaForm.get('name').errors?.minlength?.requiredLength}})
              caracteres minimo
            </ion-label>
            <ion-label
              position="stacked"
              *ngIf="nuevaOfertaForm.get('name').valid"
            >
              Nombre
            </ion-label>
            <ion-input
              placeholder="ingrese el nombre"
              formControlName="name"
            ></ion-input>
          </ion-item>
        </ion-col>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Código</ion-label>
            <ion-input
              placeholder="si aplica"
              formControlName="code"
            ></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Precio</ion-label>
            <ion-input
              type="number"
              placeholder="si aplica"
              formControlName="price"
            ></ion-input>
          </ion-item>
        </ion-col>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Total Créditos</ion-label>
            <ion-input
              type="number"
              placeholder="si aplica"
              formControlName="total"
            ></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row class="footer-row">
        <ion-col>
          <div class="footer-button-container">
            <ion-button class="footer-button" color="danger" (click)="salir()">
              Cancelar</ion-button
            >
            <ion-button
              class="footer-button"
              color="primary"
              (click)="save()"
              [disabled]="nuevaOfertaForm.invalid"
              >GRABAR
            </ion-button>
          </div>
        </ion-col>
      </ion-row>
    </form>
  </ion-grid>

  <!-- Testing Area -->
<!--   <ion-grid style="padding: 0 20px 0 20px">
    <ion-row>
      <ion-col size="auto">
        <p>Test Area</p>
        <pre>{{ nuevaOfertaForm.value | json}}</pre>
      </ion-col>
    </ion-row>
  </ion-grid>
  <ion-grid style="padding: 0 20px 0 20px">
    <ion-row>
      <ion-col size="auto">
        <p>Form Status</p>
        <pre>{{ nuevaOfertaForm.status }}</pre>

        <p>Form Status invalid</p>
        <pre>{{ nuevaOfertaForm.invalid }}</pre>
      </ion-col>
    </ion-row>
  </ion-grid> -->
</ion-content>
