<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col size="auto">
        <h1 class="ion-margin-start color-secondary">
          Actualizar Tipo de Transacción
        </h1>
      </ion-col>
      <ion-col *ngIf="wait">
        <img
          src="/assets/images/loading.gif"
          style="height: 60px; margin-top: 5px"
        />
      </ion-col>
    </ion-row>
    <form [formGroup]="transactioTypeForm">
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Nombre*</ion-label>
            <ion-input
              formControlName="name"
              placeholder="ingrese el nombre"
            ></ion-input>
          </ion-item>
          <div *ngFor="let error of errorMessages.name">
            <ng-container
              *ngIf="name.hasError(error.type) && (name.dirty || name.touched)"
            >
              <small class="error-message">{{error.message}}</small>
            </ng-container>
          </div>
        </ion-col>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Código</ion-label>
            <ion-input
              formControlName="code"
              placeholder="si aplica"
            ></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Precio</ion-label>
            <ion-input
              type="number"
              formControlName="price"
              placeholder="si aplica"
            ></ion-input>
          </ion-item>
        </ion-col>
        <ion-col>
          <ion-item>
            <ion-label position="stacked">Total Créditos</ion-label>
            <ion-input
              type="number"
              formControlName="total"
              placeholder="si aplica"
            ></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>
      <ion-row *ngIf="comparador == 'Bonificación de 500 coins'">
        <ion-col size="6">
          <ion-item>
            <ion-label position="stacked">Limite de Bonos</ion-label>
            <ion-input
              formControlName="gender"
              placeholder="si aplica"
            ></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row class="footer-row">
        <ion-col>
          <div class="footer-button-container">
            <ion-button
              class="footer-button"
              color="danger"
              (click)="cancelForm()"
              [disabled]="wait"
            >
              Cancelar</ion-button
            >
            <ion-button
              class="footer-button"
              color="primary"
              (click)="update()"
              [disabled]="!canSubmit() || wait"
            >
              Aceptar</ion-button
            >
          </div>
        </ion-col>
      </ion-row>
    </form>
  </ion-grid>
</ion-content>
